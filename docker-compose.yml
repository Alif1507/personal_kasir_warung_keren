services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kasir-backend
    env_file:
      - ./backend/.env
    ports:
      - "8010:8000"
    networks:
      - kasir-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8010
    container_name: kasir-frontend
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5180:80"
    networks:
      - kasir-network
    restart: unless-stopped

networks:
  kasir-network:
    name: kasir-network
    driver: bridge
